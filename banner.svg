<svg width="880" height="160" viewBox="0 0 880 160" xmlns="http://www.w3.org/2000/svg">
  <style>
    .bg { fill: #1a1a1a; }
    .title { font-family: 'Courier New', monospace; font-weight: 700; fill: #ffffff; letter-spacing: 3px; font-size: 28px; }
    .subtitle { font-family: 'Courier New', monospace; font-weight: 400; fill: #4da6ff; letter-spacing: 6px; font-size: 11px; }
  </style>

  <rect class="bg" width="880" height="160"/>

  <!-- Bordes azules arriba y abajo -->
  <rect x="0" y="0" width="880" height="3" fill="#4da6ff"/>
  <rect x="0" y="157" width="880" height="3" fill="#4da6ff"/>

  <!-- Texto central -->
  <text x="440" y="70" class="title" text-anchor="middle">PIXELFORGE</text>
  <text x="440" y="104" class="title" text-anchor="middle">SOFTWARE</text>
  <text x="440" y="130" class="subtitle" text-anchor="middle">DESARROLLO · SISTEMAS · MARKETING DIGITAL</text>

  <!-- Líneas decorativas izquierda -->
  <rect x="80" y="82" width="100" height="1" fill="#4da6ff" opacity="0.6"/>
  <rect x="80" y="92" width="70" height="1" fill="#4da6ff" opacity="0.3"/>
  <rect x="72" y="79" width="6" height="6" fill="#4da6ff"/>

  <!-- Líneas decorativas derecha -->
  <rect x="700" y="82" width="100" height="1" fill="#4da6ff" opacity="0.6"/>
  <rect x="730" y="92" width="70" height="1" fill="#4da6ff" opacity="0.3"/>
  <rect x="802" y="79" width="6" height="6" fill="#4da6ff"/>

  <!-- Esquinas decorativas -->
  <rect x="10" y="10" width="6" height="6" fill="#4da6ff"/>
  <rect x="18" y="10" width="4" height="4" fill="#4da6ff" opacity="0.5"/>
  <rect x="10" y="18" width="4" height="4" fill="#4da6ff" opacity="0.5"/>

  <rect x="864" y="10" width="6" height="6" fill="#4da6ff"/>
  <rect x="858" y="10" width="4" height="4" fill="#4da6ff" opacity="0.5"/>
  <rect x="864" y="18" width="4" height="4" fill="#4da6ff" opacity="0.5"/>

  <rect x="10" y="144" width="6" height="6" fill="#4da6ff"/>
  <rect x="10" y="138" width="4" height="4" fill="#4da6ff" opacity="0.5"/>
  <rect x="18" y="148" width="4" height="4" fill="#4da6ff" opacity="0.5"/>

  <rect x="864" y="144" width="6" height="6" fill="#4da6ff"/>
  <rect x="864" y="138" width="4" height="4" fill="#4da6ff" opacity="0.5"/>
  <rect x="858" y="148" width="4" height="4" fill="#4da6ff" opacity="0.5"/>
